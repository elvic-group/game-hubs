<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { width: 200px; padding: 16px; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; text-align: center; }
  h3 { color: #e94560; margin: 0 0 8px; font-size: 16px; letter-spacing: 2px; }
  p { color: #888; font-size: 11px; margin: 0 0 12px; }
  .btn { display: block; width: 100%; background: transparent; border: 2px solid #e94560; color: #e94560; padding: 8px; font-size: 13px; cursor: pointer; border-radius: 4px; font-family: inherit; transition: all 0.2s; margin-bottom: 6px; }
  .btn:hover { background: #e94560; color: #fff; }
</style>
</head>
<body>
  <h3>FLAPPY BIRD</h3>
  <p>Tap to flap, dodge the pipes!</p>
  <button class="btn" id="playBtn">Play Game</button>
<script src="popup.js"></script>
</body>
</html>
