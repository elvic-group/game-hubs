<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { width: 200px; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 16px; margin: 0; }
  h1 { color: #e94560; font-size: 22px; margin: 0 0 4px; letter-spacing: 2px; }
  p { color: #666; font-size: 11px; margin: 0 0 12px; }
  .btn { display: block; width: 100%; background: transparent; border: 2px solid #e94560; color: #e94560; padding: 8px; font-size: 14px; cursor: pointer; border-radius: 4px; font-family: inherit; margin-bottom: 8px; transition: all 0.2s; }
  .btn:hover { background: #e94560; color: #fff; }
</style>
</head>
<body>
  <h1>2048</h1>
  <p>Slide &amp; merge tiles</p>
  <button class="btn" id="playBtn">PLAY</button>
  <script src="popup.js"></script>
</body>
</html>
