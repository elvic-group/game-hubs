<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 320px; height: 200px; margin: 0; background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
  h1 { color: #e94560; font-size: 28px; margin: 0 0 8px; text-shadow: 0 0 20px rgba(233,69,96,0.5); letter-spacing: 3px; }
  p { color: #666; font-size: 12px; margin: 0 0 16px; }
  .btn { background: transparent; border: 2px solid #e94560; color: #e94560; padding: 10px 28px; font-size: 14px; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: inherit; text-decoration: none; }
  .btn:hover { background: #e94560; color: #fff; box-shadow: 0 0 15px rgba(233,69,96,0.4); }
  .footer { color: #333; font-size: 10px; margin-top: 12px; }
</style>
</head>
<body>
  <h1>TETRIS</h1>
  <p>A classic reimagined</p>
  <a class="btn" id="playBtn" href="#">PLAY</a>
  <div class="footer">Elvic Groups</div>
  <script src="popup.js"></script>
</body>
</html>
