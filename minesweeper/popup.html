<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { width: 220px; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; padding: 16px; margin: 0; text-align: center; }
  h1 { color: #e94560; font-size: 18px; margin: 0 0 4px; letter-spacing: 2px; }
  p { color: #666; font-size: 11px; margin: 0 0 14px; }
  .btn { display: block; width: 100%; background: transparent; border: 2px solid #e94560; color: #e94560; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: inherit; margin-bottom: 8px; box-sizing: border-box; }
  .btn:hover { background: #e94560; color: #fff; }
  .btn.blue { border-color: #4a90d9; color: #4a90d9; }
  .btn.blue:hover { background: #4a90d9; color: #fff; }
  .footer { color: #444; font-size: 10px; margin-top: 10px; }
</style>
</head>
<body>
  <h1>MINESWEEPER</h1>
  <p>Classic mine-clearing puzzle</p>
  <button class="btn" id="playBtn">PLAY</button>
  <button class="btn blue" id="hubBtn">Game Hubs</button>
  <div class="footer">Elvic Groups</div>
  <script src="popup.js"></script>
</body>
</html>
