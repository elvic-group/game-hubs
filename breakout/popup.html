<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 260px; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
  h1 { color: #e94560; font-size: 22px; text-shadow: 0 0 15px rgba(233,69,96,0.5); letter-spacing: 2px; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 11px; margin-bottom: 16px; }
  .btn { display: block; width: 100%; background: transparent; border: 2px solid #e94560; color: #e94560; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: inherit; margin-bottom: 8px; text-decoration: none; }
  .btn:hover { background: #e94560; color: #fff; box-shadow: 0 0 15px rgba(233,69,96,0.4); }
  .footer { color: #444; font-size: 10px; margin-top: 10px; }
</style>
</head>
<body>
  <h1>BREAKOUT</h1>
  <div class="subtitle">A classic reimagined</div>
  <button class="btn" id="playBtn">Play Game</button>
  <div class="footer">Elvic Groups — v1.0</div>
  <script src="popup.js"></script>
</body>
</html>
