<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 320px; margin: 0; background: #0a0a1a; display: flex; flex-direction: column; align-items: center; padding: 20px 16px; font-family: 'Segoe UI', sans-serif; }
  h1 { color: #e94560; font-size: 24px; margin: 0 0 4px; text-shadow: 0 0 20px rgba(233,69,96,0.5); letter-spacing: 3px; }
  .subtitle { color: #666; font-size: 11px; margin-bottom: 16px; }
  .game-btn { display: flex; align-items: center; gap: 12px; width: 100%; background: #0f1123; border: 2px solid rgba(233,69,96,0.15); color: #e94560; padding: 12px 16px; font-size: 14px; cursor: pointer; border-radius: 6px; transition: all 0.2s; font-family: inherit; margin-bottom: 8px; text-align: left; }
  .game-btn:hover { border-color: #e94560; background: #141633; box-shadow: 0 0 15px rgba(233,69,96,0.2); }
  .game-btn .icon { font-size: 22px; width: 32px; text-align: center; }
  .game-btn .label { flex: 1; }
  .game-btn .label span { display: block; color: #666; font-size: 11px; margin-top: 2px; }
  .divider { width: 100%; height: 1px; background: rgba(233,69,96,0.1); margin: 4px 0 12px; }
  .hub-btn { background: transparent; border: 2px solid #4a90d9; color: #4a90d9; padding: 8px 20px; font-size: 13px; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: inherit; width: 100%; }
  .hub-btn:hover { background: #4a90d9; color: #fff; box-shadow: 0 0 15px rgba(74,144,217,0.3); }
  .footer { color: #333; font-size: 10px; margin-top: 12px; }
</style>
</head>
<body>
  <h1>GAME HUBS</h1>
  <div class="subtitle">by Elvic Groups</div>

  <button class="game-btn" id="snakeBtn">
    <div class="icon">&#9654;</div>
    <div class="label">SNAKE<span>Arcade — Single Player</span></div>
  </button>

  <button class="game-btn" id="tttBtn">
    <div class="icon">&#9654;</div>
    <div class="label">TIC-TAC-TOE<span>Strategy — 1-2 Players</span></div>
  </button>

  <button class="game-btn" id="pongBtn">
    <div class="icon">&#9654;</div>
    <div class="label">PING PONG<span>Arcade — 1-2 Players</span></div>
  </button>

  <div class="divider"></div>

  <button class="hub-btn" id="hubBtn">Open Full Game Hubs</button>

  <div class="footer">Elvic Groups</div>

  <script src="popup.js"></script>
</body>
</html>
